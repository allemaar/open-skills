<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>orient-map reference — open-skills on a branch</title>
  <desc>Done to here to next as a tree: P0-contract and cold-vet attested on the trunk, the cursor fix-pass attested on a branch off cold-vet, two ahead, zero behind, one commit missed on main, rejoin to main inferred. Tier: filled diamond attested, half diamond inferred.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="context-stroke"/>
    </marker>
  </defs>

  <line x1="60" y1="64" x2="620" y2="64" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
  <text class="ts" x="60" y="52">main</text>
  <text class="ts" x="620" y="52" text-anchor="end">1 missed on main since the fork</text>

  <g class="c-gray"><circle cx="150" cy="64" r="7"/></g>
  <text class="ts" x="150" y="92" text-anchor="middle">P0-contract ◆</text>
  <text class="ts" x="150" y="106" text-anchor="middle">(done)</text>

  <g class="c-gray"><circle cx="320" cy="64" r="7"/></g>
  <text class="ts" x="320" y="40" text-anchor="middle">(fork)</text>
  <text class="ts" x="320" y="52" text-anchor="middle">cold-vet ◆</text>

  <path d="M157,64 L313,64" fill="none" stroke="var(--color-border-primary)" stroke-width="0.5" marker-end="url(#arrow)"/>
  <path d="M320,71 C320,112 360,124 453,124" fill="none" stroke="var(--color-border-primary)" stroke-width="0.5" marker-end="url(#arrow)"/>

  <g class="c-teal"><circle cx="464" cy="124" r="11"/></g>
  <text class="th" x="464" y="156" text-anchor="middle">fix-pass ◆</text>
  <text class="ts" x="464" y="170" text-anchor="middle">(here)</text>

  <path d="M475,124 C560,124 560,82 600,70" fill="none" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.6"/>
  <text class="ts" x="610" y="66" text-anchor="end" opacity="0.6">◐ rejoins main (inferred)</text>

  <text class="ts" x="60" y="150">ahead 2 · behind 0 · trunk eta n/a (not on this path)</text>
  <text class="ts" x="60" y="186">tier: ◆ attested · ◐ inferred · ◌ guessed</text>
</svg>
