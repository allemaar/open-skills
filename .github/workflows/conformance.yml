name: conformance

# Runs the pack's named product checks on every push and PR. Protocol validity is
# necessary but not sufficient for the README badge: the job also checks metadata,
# references, dataflow, generated catalogs, counts, privacy, and release consistency.

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags — the consistency guard checks CHANGELOG ↔ git tags
      # First: it is pure git, needs no parser and no setup-node, and a sign-off is
      # the cheapest thing to get wrong. GitHub surfaces the FIRST failing step, so
      # putting it here hands a contributor the fixable error rather than burying it
      # under the suite. DCO_BASE grades a PR on its OWN commits — without it, one
      # unsigned commit on main would red-line every later PR for someone else's work.
      - name: DCO guard (every non-merge commit after the floor carries a sign-off)
        run: node tools/dco-guard.mjs
        env:
          DCO_BASE: ${{ github.event.pull_request.base.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install the public YON parser
        run: npm install -g @younndai/yon-parser
      - name: Validate all protocol.yon (strict)
        run: node tools/conformance.mjs
      - name: Structural lint (cross-references, names, dual-doc sync)
        run: node tools/lint.mjs
      - name: YON-DAG semantic check (dangling refs, unreachable steps)
        run: node tools/yon-dag.mjs
      - name: Validate Agent Mailbox lazy protocols (strict + semantic DAG)
        run: |
          for file in \
            skills/agent-mailbox/protocols/collab-window.yon \
            skills/agent-mailbox/protocols/scheduled-collab.yon \
            skills/agent-mailbox/protocols/missed-message-recovery.yon
          do
            yon validate "$file" --profile exec
            node tools/yon-dag.mjs "$file"
          done
      - name: Spine manifests in sync (machine catalogs + SKILLS.md)
        run: node tools/spine.mjs --check
      - name: Validate the YON manifests (catalog + graph are themselves YON)
        run: |
          yon validate catalog.yon --profile full
          yon validate skills.graph.yon --profile full
      - name: Orient-record round-trip (the orient- example survives parse→format→parse)
        run: node tools/orient-roundtrip.mjs
      - name: Leak guard (no machine-specific / absolute paths in the public pack)
        run: node tools/leak-guard.mjs
      - name: Candidate consistency (branch and pull-request commits)
        if: github.ref_type != 'tag'
        run: node tools/consistency-guard.mjs --candidate
      - name: Strict release consistency (tag commits)
        if: github.ref_type == 'tag'
        run: node tools/consistency-guard.mjs --release
